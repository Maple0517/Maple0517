<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Maple GitHub profile — modern technology banner</title>
  <desc id="desc">A dark elegant futuristic banner with glass panels, orbital lines, and highlighted projects Accountant and Pomotree.</desc>
  <defs>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 90) rotate(43) scale(470 280)">
      <stop stop-color="#7C3AED" stop-opacity="0.78"/>
      <stop offset="0.43" stop-color="#22D3EE" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#050711" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(940 410) rotate(-135) scale(420 250)">
      <stop stop-color="#34D399" stop-opacity="0.62"/>
      <stop offset="0.42" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#050711" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="85" y1="49" x2="1115" y2="471" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.30"/>
      <stop offset="0.47" stop-color="#67E8F9" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#A7F3D0" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="headline" x1="132" y1="173" x2="598" y2="264" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.48" stop-color="#DDFBFF"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#A5F3FC" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .pulse { animation: pulse 4.8s cubic-bezier(.2,.8,.2,1) infinite; transform-origin: center; }
      .drift { animation: drift 8s cubic-bezier(.2,.8,.2,1) infinite alternate; }
      .scan { animation: scan 6.5s cubic-bezier(.4,0,.2,1) infinite; }
      @keyframes pulse { 0%, 100% { opacity: .46; transform: scale(1); } 50% { opacity: 1; transform: scale(1.018); } }
      @keyframes drift { from { transform: translate3d(-8px, 4px, 0); } to { transform: translate3d(10px, -6px, 0); } }
      @keyframes scan { 0% { transform: translateX(-440px); opacity: 0; } 18%, 72% { opacity: .9; } 100% { transform: translateX(440px); opacity: 0; } }
    </style>
  </defs>

  <rect width="1200" height="520" rx="44" fill="#050711"/>
  <rect width="1200" height="520" rx="44" fill="url(#glowA)"/>
  <rect width="1200" height="520" rx="44" fill="url(#glowB)"/>
  <rect width="1200" height="520" rx="44" fill="url(#grid)"/>

  <g opacity="0.72" filter="url(#soft)">
    <circle cx="976" cy="143" r="92" fill="#22D3EE" fill-opacity="0.20"/>
    <circle cx="784" cy="384" r="76" fill="#A78BFA" fill-opacity="0.18"/>
    <circle cx="344" cy="398" r="82" fill="#34D399" fill-opacity="0.14"/>
  </g>

  <rect x="74" y="46" width="1052" height="428" rx="34" fill="#080A12" fill-opacity="0.72" stroke="url(#edge)" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="92" y="64" width="1016" height="392" rx="26" fill="#FFFFFF" fill-opacity="0.025" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <g opacity="0.58">
    <path d="M735 119C841 75 968 98 1029 190C1089 281 1021 396 903 410C785 424 703 339 721 244C730 194 693 137 735 119Z" stroke="#67E8F9" stroke-opacity="0.30"/>
    <path d="M762 145C854 110 950 129 1001 200C1052 270 997 360 903 374C809 388 741 321 754 244C762 198 729 158 762 145Z" stroke="#A7F3D0" stroke-opacity="0.22"/>
    <circle class="pulse" cx="921" cy="252" r="92" stroke="#E0F2FE" stroke-opacity="0.38"/>
    <circle class="pulse" cx="921" cy="252" r="48" stroke="#A7F3D0" stroke-opacity="0.42"/>
    <path class="drift" d="M827 251H1018" stroke="url(#cyanLine)" stroke-width="2"/>
    <path class="drift" d="M920 158V348" stroke="url(#cyanLine)" stroke-width="2"/>
  </g>

  <g transform="translate(132 116)">
    <rect x="0" y="0" width="203" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.055" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <circle cx="18" cy="17" r="4" fill="#34D399"/>
    <text x="32" y="22" class="mono" font-size="12" letter-spacing="2.4" fill="#B8F7D4">ONLINE BUILDER</text>

    <text x="0" y="103" class="sans" font-size="76" font-weight="750" letter-spacing="-4.2" fill="url(#headline)">Maple</text>
    <text x="3" y="151" class="sans" font-size="31" font-weight="520" letter-spacing="-0.8" fill="#E5F7FF">Software systems with calm interfaces</text>
    <text x="4" y="190" class="sans" font-size="17" fill="#94A3B8">AI finance ops · local-first focus tools · automation craft</text>

    <g transform="translate(0 236)">
      <rect x="0" y="0" width="186" height="46" rx="23" fill="#9DECF9" fill-opacity="0.12" stroke="#9DECF9" stroke-opacity="0.42"/>
      <text x="24" y="29" class="mono" font-size="13" letter-spacing="1.1" fill="#DDFBFF">accountant</text>
      <path d="M149 23H164M158 17L164 23L158 29" stroke="#9DECF9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="206" y="0" width="172" height="46" rx="23" fill="#B8F7D4" fill-opacity="0.12" stroke="#B8F7D4" stroke-opacity="0.40"/>
      <text x="230" y="29" class="mono" font-size="13" letter-spacing="1.1" fill="#E9FFF3">Pomotree</text>
      <path d="M339 23H354M348 17L354 23L348 29" stroke="#B8F7D4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g transform="translate(724 138)">
    <rect x="0" y="0" width="298" height="234" rx="28" fill="#020617" fill-opacity="0.62" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <rect x="18" y="18" width="262" height="198" rx="20" fill="#FFFFFF" fill-opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="38" y="57" class="mono" font-size="11" letter-spacing="2" fill="#67E8F9">SYSTEM SIGNAL</text>
    <text x="38" y="95" class="sans" font-size="28" font-weight="700" fill="#F8FAFC">precise / fast / human</text>
    <g class="scan" opacity="0.8">
      <rect x="38" y="114" width="220" height="2" rx="1" fill="url(#cyanLine)"/>
    </g>
    <g class="mono" font-size="12" fill="#CBD5E1">
      <text x="38" y="139">$ ship useful tools</text>
      <text x="38" y="166">$ refine interaction details</text>
      <text x="38" y="193">$ automate the boring parts</text>
    </g>
    <circle cx="244" cy="48" r="7" fill="#34D399"/>
    <circle cx="220" cy="48" r="7" fill="#22D3EE" fill-opacity="0.85"/>
    <circle cx="196" cy="48" r="7" fill="#A78BFA" fill-opacity="0.85"/>
  </g>

  <g opacity="0.36">
    <path d="M112 406H517" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <path d="M145 430H482" stroke="#67E8F9" stroke-opacity="0.16"/>
    <circle cx="1091" cy="89" r="3" fill="#E0F2FE"/>
    <circle cx="681" cy="91" r="2" fill="#A7F3D0"/>
    <circle cx="1052" cy="433" r="2" fill="#67E8F9"/>
  </g>
</svg>
